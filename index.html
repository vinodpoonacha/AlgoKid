<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Algo Kid — Olympiad Learning</title>
<meta name="theme-color" content="#7C5CFC" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Algo Kid" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241C3B; --muted:#8B84A3; --line:#EEE9F7;
    --bg1:#EEF4FF; --bg2:#FCEEF8; --bg3:#FFF6EA;
    --purple:#7C5CFC; --green:#22C55E; --amber:#F5A623; --blue:#3B82F6; --pink:#EC4899; --teal:#14B8A6; --red:#EF4444;
    --card:#ffffff; --shadow:0 6px 18px rgba(90,60,160,.10), 0 2px 5px rgba(90,60,160,.06);
    --shadow-lg:0 14px 40px rgba(90,60,160,.18);
    --head:'Baloo 2', system-ui, sans-serif; --body:'Nunito', system-ui, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:var(--body); color:var(--ink);
    background:linear-gradient(165deg,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
    background-attachment:fixed; min-height:100vh;
  }
  h1,h2,h3,.head{ font-family:var(--head); }
  .app{ max-width:600px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
  /* Tablet & large screens */
  @media (min-width:720px){
    .app{ max-width:900px; }
    .nav{ max-width:900px; }
    .screen{ padding:20px 28px 120px; }
    .worlds-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .worlds-grid .world{ margin-bottom:0; }
    .topics-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .topics-grid .topic{ margin-bottom:0; }
    .topics-grid .grouphdr{ grid-column:1/-1; }
    .hero h2{ font-size:30px; } .hero p{ font-size:17px; }
    .qcard{ max-width:640px; margin:0 auto; }
    #opts,.tiles,.mgrid,.bwrap,.fbtns{ max-width:640px; margin-left:auto; margin-right:auto; }
    .qtext{ font-size:24px; } .opt{ font-size:22px; }
    .mgrid{ grid-template-columns:repeat(6,1fr); }
    .readiness,.rcard{ max-width:720px; margin-left:auto; margin-right:auto; }
    .badges-grid{ grid-template-columns:repeat(4,1fr)!important; }
  }
  @media (min-width:1000px){ .app,.nav{ max-width:1000px; } }
  .kbtn{ transition:transform .09s ease, box-shadow .09s ease, background .2s; cursor:pointer; border:none; font-family:inherit; }
  .kbtn:active{ transform:translateY(3px) scale(.99); }
  .screen{ padding:14px 16px 108px; animation:fade .28s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }

  /* Top app bar */
  .appbar{ position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; background:rgba(255,255,255,.72); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .appbar .brand{ display:flex; align-items:center; gap:9px; font-family:var(--head); font-weight:800; font-size:20px; color:var(--purple); }
  .appbar .brand .logo{ width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#8B6BFF,#6D9CFF); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(124,92,252,.4); }
  .chip{ display:inline-flex; align-items:center; gap:6px; background:#fff; border-radius:999px; padding:7px 13px; font-weight:800; box-shadow:var(--shadow); font-size:15px; }

  /* Hero */
  .hero{ position:relative; border-radius:26px; padding:20px; color:#fff; overflow:hidden;
    background:linear-gradient(135deg,var(--heroA,#7C5CFC),var(--heroB,#5B8DEF)); box-shadow:var(--shadow-lg); margin-bottom:6px; }
  .hero h2{ font-size:24px; font-weight:800; }
  .hero p{ opacity:.92; font-weight:600; margin-top:2px; }
  .hero .bubbles{ position:absolute; inset:0; pointer-events:none; }
  .hero .bub{ position:absolute; border-radius:50%; background:rgba(255,255,255,.14); }

  .sec-title{ font-family:var(--head); font-weight:800; font-size:16px; color:var(--muted); margin:18px 6px 10px; text-transform:uppercase; letter-spacing:.6px; }

  /* World cards */
  .world{ display:flex; align-items:center; gap:15px; width:100%; text-align:left; border-radius:24px; padding:18px; margin-bottom:14px;
    background:var(--card); box-shadow:var(--shadow); position:relative; overflow:hidden; }
  .world .ic{ width:62px; height:62px; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:34px; flex-shrink:0; }
  .world .t{ font-family:var(--head); font-size:22px; font-weight:800; display:block; }
  .world .s{ font-size:13.5px; color:var(--muted); font-weight:700; display:block; margin-top:1px; }
  .world .go{ margin-left:auto; color:var(--muted); font-size:26px; }
  .world .strip{ position:absolute; left:0; top:0; bottom:0; width:6px; }

  /* Topic cards */
  .topic{ display:flex; align-items:center; gap:14px; width:100%; text-align:left; border-radius:20px; padding:14px 15px; margin-bottom:12px;
    background:var(--card); box-shadow:var(--shadow); }
  .topic .ic{ width:52px; height:52px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:27px; flex-shrink:0; }
  .topic .mid{ flex:1; min-width:0; }
  .topic .t{ font-family:var(--head); font-size:18px; font-weight:700; display:block; }
  .topic .meta{ font-size:12.5px; color:var(--muted); font-weight:700; display:flex; align-items:center; gap:6px; margin-top:3px; }
  .badge{ font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; color:#fff; }
  .ring{ flex-shrink:0; }
  .segwrap{ display:flex; gap:6px; background:#EDE7F7; border-radius:16px; padding:6px; margin:14px 0 4px; }
  .seg{ flex:1; border:none; background:none; border-radius:12px; padding:11px 8px; font-family:var(--head); font-weight:800; font-size:15px; color:var(--muted); cursor:pointer; transition:all .18s; }
  .seg.active{ background:#fff; color:var(--purple); box-shadow:0 3px 8px rgba(124,92,252,.18); }
  .seg .lk{ font-size:12px; }
  .lockmsg{ text-align:center; background:#fff; border-radius:20px; padding:26px 20px; box-shadow:var(--shadow); margin-top:14px; }
  .grouphdr{ display:flex; align-items:center; gap:8px; font-family:var(--head); font-weight:800; font-size:15px; color:var(--ink); margin:18px 4px 10px; }
  .grouphdr .line{ flex:1; height:2px; background:var(--line); border-radius:2px; }

  /* Buttons */
  .btn{ border-radius:16px; padding:13px 22px; font-family:var(--head); font-weight:700; font-size:17px; }
  .btn-primary{ background:linear-gradient(135deg,#7C5CFC,#6D9CFF); color:#fff; box-shadow:0 6px 16px rgba(124,92,252,.4); }
  .btn-ghost{ background:#fff; color:var(--purple); box-shadow:var(--shadow); }
  /* Big premium finish buttons */
  .fbtns{ display:flex; flex-direction:column; gap:14px; margin-top:26px; padding:0 6px; }
  .fbtn{ display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
    border-radius:22px; padding:18px 22px; font-family:var(--head); font-weight:800; font-size:22px;
    position:relative; border:none; }
  .fbtn .fic{ font-size:26px; }
  .fbtn-primary{ color:#fff; background:linear-gradient(135deg,#7C5CFC,#6D9CFF);
    box-shadow:0 8px 0 #5B3FD6, 0 14px 24px rgba(124,92,252,.45); }
  .fbtn-primary:active{ transform:translateY(6px); box-shadow:0 2px 0 #5B3FD6, 0 6px 12px rgba(124,92,252,.4); }
  .fbtn-accent{ color:#fff; background:linear-gradient(135deg,#FDB646,#F5872A);
    box-shadow:0 8px 0 #D96E12, 0 14px 24px rgba(245,135,42,.45); }
  .fbtn-accent:active{ transform:translateY(6px); box-shadow:0 2px 0 #D96E12, 0 6px 12px rgba(245,135,42,.4); }
  .fbtn-ghost{ color:var(--purple); background:#fff;
    box-shadow:0 6px 0 #E3DBF7, 0 12px 20px rgba(124,92,252,.18); }
  .fbtn-ghost:active{ transform:translateY(5px); box-shadow:0 1px 0 #E3DBF7, 0 5px 10px rgba(124,92,252,.15); }
  .fbtn .shine{ position:absolute; top:6px; left:16px; right:16px; height:34%; border-radius:16px; background:linear-gradient(180deg,rgba(255,255,255,.35),rgba(255,255,255,0)); pointer-events:none; }
  .backbtn{ display:inline-flex; align-items:center; gap:6px; background:#fff; color:var(--ink); border-radius:14px; padding:10px 16px; font-weight:800; box-shadow:var(--shadow); margin-top:16px; }
  /* Quick action tiles */
  .quick{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:14px 0 4px; }
  .qtile{ border:none; border-radius:18px; color:#fff; padding:14px 6px; font-family:var(--head); font-weight:800; font-size:13px; line-height:1.15; text-align:center; box-shadow:var(--shadow); }
  .qtile .qe{ display:block; font-size:26px; margin-bottom:4px; }
  /* Badges & trophy shelf */
  .badges-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .badge-card{ background:#fff; border-radius:18px; padding:14px 8px; text-align:center; box-shadow:var(--shadow); position:relative; }
  .badge-card.locked{ opacity:.45; filter:grayscale(.7); }
  .badge-card .be{ font-size:38px; }
  .badge-card .bn{ font-family:var(--head); font-weight:800; font-size:12.5px; margin-top:4px; }
  .badge-card .bd{ font-size:10.5px; color:var(--muted); font-weight:700; margin-top:2px; }
  .outfit-row{ display:flex; gap:10px; overflow-x:auto; padding:4px 2px 8px; }
  .outfit{ flex:0 0 auto; width:92px; background:#fff; border-radius:16px; padding:10px 6px; text-align:center; box-shadow:var(--shadow); border:3px solid transparent; }
  .outfit.on{ border-color:var(--purple); }
  .outfit.locked{ opacity:.5; }
  .outfit .oname{ font-family:var(--head); font-weight:800; font-size:11.5px; margin-top:4px; }
  .outfit .ocost{ font-size:10.5px; color:var(--amber); font-weight:800; }
  /* Parent dashboard */
  .pinpad{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:280px; margin:16px auto; }
  .pinpad button{ background:#fff; border:none; border-radius:16px; padding:18px; font-family:var(--head); font-weight:800; font-size:24px; box-shadow:var(--shadow); color:var(--ink); cursor:pointer; }
  .statcard{ background:#fff; border-radius:18px; padding:16px; box-shadow:var(--shadow); text-align:center; }
  .statcard .sv{ font-family:var(--head); font-weight:800; font-size:26px; color:var(--purple); }
  .statcard .sl{ font-size:12px; color:var(--muted); font-weight:800; margin-top:2px; }
  /* Timer chip */
  .timerchip{ font-family:var(--head); font-weight:800; font-size:16px; padding:6px 12px; border-radius:999px; background:#FEF3C7; color:#B45309; }

  /* Quiz */
  .qhead{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .qhead .ttl{ font-family:var(--head); font-weight:800; font-size:19px; }
  .pbar{ height:12px; background:#EDE7F7; border-radius:8px; overflow:hidden; flex:1; }
  .pbar>div{ height:100%; width:0; border-radius:8px; transition:width .4s ease; }
  .qcard{ background:#fff; border-radius:24px; padding:20px 16px; text-align:center; box-shadow:var(--shadow); }
  .qrow{ display:flex; gap:8px; align-items:center; justify-content:center; }
  .qtext{ font-family:var(--head); font-size:21px; font-weight:700; line-height:1.25; }
  .readbtn{ width:40px; height:40px; border-radius:50%; color:#fff; font-size:18px; flex-shrink:0; box-shadow:0 4px 10px rgba(0,0,0,.12); }
  .qbig{ font-size:46px; margin:16px 0 4px; white-space:pre-line; line-height:1.15; }
  .bwrap{ min-height:46px; display:flex; align-items:center; justify-content:center; margin:12px 0; }
  .banner{ padding:9px 20px; border-radius:999px; font-family:var(--head); font-weight:700; font-size:18px; animation:pop .32s ease; box-shadow:var(--shadow); }
  @keyframes pop{ 0%{transform:scale(.5)} 60%{transform:scale(1.12)} 100%{transform:scale(1)} }
  .opt{ display:flex; align-items:center; gap:15px; width:100%; text-align:left; border-radius:18px; padding:15px 16px; margin-bottom:11px;
    background:#fff; box-shadow:var(--shadow); font-family:var(--head); font-weight:600; font-size:20px; border:3px solid transparent; }
  .opt .oe{ font-size:34px; min-width:44px; text-align:center; }
  .opt .ot{ flex:1; }

  /* Order / tiles */
  .tiles{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:6px; }
  .tile{ width:84px; height:84px; border-radius:20px; background:#fff; font-family:var(--head); font-size:38px; font-weight:800;
    display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); border:3px solid transparent; }

  /* Memory */
  .mgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:8px; }
  .mcard{ aspect-ratio:1; border-radius:16px; font-size:30px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow);
    background:linear-gradient(135deg,#8B6BFF,#6D9CFF); color:#fff; position:relative; }
  .mcard.flipped{ background:#fff; color:var(--ink); }
  .mcard.matched{ background:#DCFCE7; color:var(--ink); box-shadow:none; opacity:.9; }
  .mcard .q{ font-size:30px; }

  /* Report */
  .readiness{ background:#fff; border-radius:24px; padding:20px; box-shadow:var(--shadow); text-align:center; margin-bottom:16px; }
  .meter{ height:16px; background:#EDE7F7; border-radius:10px; overflow:hidden; margin-top:12px; }
  .meter>div{ height:100%; border-radius:10px; background:linear-gradient(90deg,#F5A623,#22C55E); transition:width .6s ease; }
  .rrow{ display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line); }
  .rrow:last-child{ border-bottom:none; }
  .rrow .rn{ font-family:var(--head); font-weight:700; font-size:15px; flex:1; }
  .rmini{ height:10px; width:120px; background:#EDE7F7; border-radius:6px; overflow:hidden; }
  .rmini>div{ height:100%; border-radius:6px; }
  .rcard{ background:#fff; border-radius:22px; padding:8px 16px; box-shadow:var(--shadow); margin-bottom:16px; }

  /* Bottom nav */
  .nav{ position:fixed; left:0; right:0; bottom:0; z-index:30; max-width:600px; margin:0 auto;
    background:rgba(255,255,255,.9); backdrop-filter:blur(12px); border-top:1px solid var(--line);
    display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); }
  .nav button{ flex:1; background:none; border:none; padding:8px 0; display:flex; flex-direction:column; align-items:center; gap:3px;
    font-family:var(--head); font-weight:700; font-size:12px; color:var(--muted); cursor:pointer; }
  .nav button .ni{ font-size:22px; line-height:1; }
  .nav button.active{ color:var(--purple); }
  .nav button.active .ni{ transform:translateY(-1px); }

  /* Splash */
  #splash{ position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:26px; gap:6px; overflow:auto;
    background:linear-gradient(165deg,var(--bg1),var(--bg2) 55%,var(--bg3)); }
  #splash h1{ font-family:var(--head); font-size:40px; color:var(--purple); margin-top:10px; }
  #splash p.tag{ color:var(--muted); font-weight:700; font-size:17px; margin:2px 0 20px; }
  .splashbtn{ background:linear-gradient(135deg,#7C5CFC,#6D9CFF); color:#fff; border-radius:24px; padding:17px 44px; font-family:var(--head); font-size:24px; font-weight:800; box-shadow:0 10px 26px rgba(124,92,252,.45); }
  .linkbtn{ background:none; color:var(--purple); font-weight:800; font-size:15px; text-decoration:underline; margin-top:14px; cursor:pointer; border:none; }
  .diagbox{ margin-top:18px; background:#fff; border-radius:18px; padding:14px 18px; max-width:340px; box-shadow:var(--shadow); font-size:14.5px; line-height:1.5; font-weight:600; }
  .diagbox b.h{ display:block; margin-bottom:6px; color:var(--purple); font-family:var(--head); }

  /* Settings modal */
  #settings{ display:none; position:fixed; inset:0; z-index:110; background:rgba(40,20,70,.45); align-items:flex-end; justify-content:center; }
  .sheet{ background:#fff; border-radius:26px 26px 0 0; padding:22px 20px calc(22px + env(safe-area-inset-bottom)); width:100%; max-width:600px; box-shadow:0 -10px 40px rgba(0,0,0,.2); animation:slideup .3s ease; }
  @keyframes slideup{ from{transform:translateY(100%)} to{transform:none} }
  .sheet h2{ font-size:22px; color:var(--purple); margin-bottom:6px; }
  .sheet label{ display:block; font-weight:800; font-size:14px; margin:14px 0 6px; color:var(--muted); }
  .sheet select{ width:100%; padding:13px; border:2px solid var(--line); border-radius:14px; font-size:16px; font-family:var(--body); font-weight:700; background:#fff; color:var(--ink); }
  .sheet .row{ display:flex; gap:10px; margin-top:18px; }
  .sheet .row button{ flex:1; border-radius:15px; padding:14px; font-family:var(--head); font-weight:800; font-size:16px; }
  #confetti{ position:fixed; inset:0; pointer-events:none; z-index:90; overflow:hidden; }
  .conf{ position:absolute; top:-40px; }
  /* Reading highlight on option being spoken */
  .opt.reading{ border-color:var(--purple); background:#F3EEFF; transform:scale(1.03); box-shadow:0 0 0 4px rgba(124,92,252,.22); }
  .tf-reading{ outline:4px solid var(--purple); outline-offset:2px; }
  /* Character celebration layer */
  #charLayer{ position:fixed; inset:0; pointer-events:none; z-index:95; overflow:hidden; }
  .char{ position:absolute; bottom:-20px; font-size:64px; will-change:transform; filter:drop-shadow(0 6px 8px rgba(0,0,0,.18)); }
  @keyframes danceIn{ 0%{transform:translateY(220px) scale(.3) rotate(-12deg); opacity:0} 30%{opacity:1} 65%{transform:translateY(-26px) scale(1.12) rotate(5deg)} 100%{transform:translateY(0) scale(1) rotate(0)} }
  @keyframes danceLoop{ 0%,100%{transform:translateY(0) rotate(-7deg)} 25%{transform:translateY(-22px) rotate(0deg)} 50%{transform:translateY(0) rotate(7deg)} 75%{transform:translateY(-22px) rotate(0deg)} }
  @keyframes charOut{ 0%{opacity:1; transform:translateY(0) scale(1)} 100%{transform:translateY(200px) scale(.4); opacity:0} }
  .char.dance{ animation:danceIn .6s ease-out forwards, danceLoop .9s ease-in-out .6s 4, charOut .55s ease-in 4.7s forwards; }
  /* Idle thinking buddy */
  #thinkBuddy{ position:fixed; right:14px; bottom:96px; z-index:96; display:none; align-items:flex-end; gap:4px; pointer-events:none; animation:bobBuddy 1.6s ease-in-out infinite; }
  @keyframes bobBuddy{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  #thinkBuddy .who{ font-size:56px; filter:drop-shadow(0 5px 6px rgba(0,0,0,.18)); }
  #thinkBuddy .bubble{ background:#fff; border-radius:16px 16px 16px 4px; padding:8px 12px; box-shadow:var(--shadow); font-size:26px; margin-bottom:22px; }
  /* Theme picker */
  .theme-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px; }
  .theme-card{ border:3px solid transparent; border-radius:16px; padding:12px 6px; text-align:center; box-shadow:var(--shadow); cursor:pointer; font-family:var(--head); font-weight:800; font-size:12.5px; }
  .theme-card.on{ border-color:var(--purple); }
  .theme-card .te{ display:block; font-size:30px; margin-bottom:4px; }
  /* Install button */
  .installbtn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; border:none; border-radius:18px; padding:15px; margin:4px 0 2px;
    font-family:var(--head); font-weight:800; font-size:17px; color:#fff; background:linear-gradient(135deg,#22C55E,#16A34A); box-shadow:0 6px 0 #128A3E, 0 12px 20px rgba(34,197,94,.35); }
  .installbtn:active{ transform:translateY(5px); box-shadow:0 1px 0 #128A3E; }
  .char svg{ width:100%; height:auto; display:block; overflow:visible; }
  #thinkBuddy .who{ width:70px; font-size:0; }
  #thinkBuddy .who svg{ width:70px; height:auto; display:block; overflow:visible; }
  #thinkBuddy .bubble{ font-family:var(--head); font-weight:800; color:var(--purple); }
  .qscene{ display:flex; justify-content:center; align-items:center; margin:10px 0 2px; min-height:120px; }
  .qscene svg{ width:100%; max-width:290px; height:auto; overflow:visible; }
  .opt .oe svg{ width:38px; height:38px; display:inline-block; vertical-align:middle; }
</style>
</head>
<body>
<div id="confetti"></div>
<div id="charLayer"></div>
<div id="thinkBuddy"><div class="bubble">🤔</div><div class="who">🤖</div></div>

<!-- SPLASH -->
<div id="splash">
  <div class="floaty" id="splashRobot"></div>
  <h1>Algo Kid</h1>
  <p class="tag">Algorithms · Data · Olympiad — for little champions</p>
  <button class="kbtn splashbtn" id="startBtn">▶ Tap to Start</button>

<script>
/* ============================================================
   CONTENT BANK  (injected below by second step)
   ============================================================ */
var CONTENT = window.__CONTENT__ || {};
const PRAISES = ["Wow! Amazing job!","Fantastic! You are so smart!","Yay! That is correct!","Woohoo! You are a champion!","Brilliant! Well done, superstar!","Great work! You did it!","Perfect! You are a genius!","Hooray! Super duper!","Excellent! Keep going, champ!","You nailed it! Awesome!"];
const CHEERS = ["Oops! Try again, you can do it!","Almost there! Give it another go!","Not quite, buddy. Try once more!","So close! Try again, little champ!","Good try! Have another go!"];

/* ---------------- OUTFITS & FEATURE STATE ---------------- */
const OUTFITS={
  none:  {name:'Classic', body:'#7C5CFC', cost:0},
  party: {name:'Party Hat', body:'#7C5CFC', cost:20},
  cap:   {name:'Red Cap', body:'#EF4444', cost:60},
  crown: {name:'Gold Crown', body:'#F5A623', cost:120},
  wizard:{name:'Wizard', body:'#5B3FD6', cost:220},
  space: {name:'Astronaut', body:'#3B82F6', cost:350}
};
let curOutfit='none', musicOn=true;

/* ---------------- ROBOT ---------------- */
function robot(size, mood, outfit){
  outfit = outfit || (typeof curOutfit!=='undefined'? curOutfit : 'none');
  const eyes = mood==="celebrate"
    ? `<path d="M40 44 Q46 36 52 44" stroke="#3A2B7A" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M68 44 Q74 36 80 44" stroke="#3A2B7A" stroke-width="4" fill="none" stroke-linecap="round"/>`
    : `<circle cx="46" cy="42" r="6" fill="#3A2B7A"/><circle cx="74" cy="42" r="6" fill="#3A2B7A"/><circle cx="48" cy="40" r="2" fill="#fff"/><circle cx="76" cy="40" r="2" fill="#fff"/>`;
  const mouth = mood==="sad"
    ? `<path d="M48 60 Q60 52 72 60" stroke="#3A2B7A" stroke-width="4" fill="none" stroke-linecap="round"/>`
    : `<path d="M46 54 Q60 66 74 54" stroke="#3A2B7A" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  const bodyCol = OUTFITS[outfit] && OUTFITS[outfit].body ? OUTFITS[outfit].body : '#7C5CFC';
  let hat='';
  if(outfit==='party') hat=`<path d="M60 -2 L48 22 L72 22 Z" fill="#FF7AA2"/><circle cx="60" cy="-4" r="5" fill="#FFD84D"/>`;
  else if(outfit==='crown') hat=`<path d="M40 20 L44 4 L52 16 L60 2 L68 16 L76 4 L80 20 Z" fill="#FFC94D" stroke="#F5A623" stroke-width="1.5"/><circle cx="60" cy="9" r="3" fill="#EC4899"/>`;
  else if(outfit==='wizard') hat=`<path d="M60 -6 L44 24 L76 24 Z" fill="#5B3FD6"/><circle cx="56" cy="10" r="2" fill="#FFD84D"/><circle cx="63" cy="16" r="2" fill="#FFD84D"/><path d="M42 24 h36" stroke="#5B3FD6" stroke-width="4" stroke-linecap="round"/>`;
  else if(outfit==='cap') hat=`<path d="M34 22 Q60 -2 86 22 Z" fill="#EF4444"/><rect x="34" y="20" width="52" height="5" rx="2" fill="#B91C1C"/><circle cx="60" cy="4" r="4" fill="#fff"/>`;
  else if(outfit==='space') hat=`<path d="M32 26 Q60 -6 88 26" fill="none" stroke="#9DB4FF" stroke-width="5"/><rect x="30" y="22" width="60" height="8" rx="4" fill="#9DB4FF"/>`;
  const antenna = outfit==='space' ? '' : `<line x1="60" y1="18" x2="60" y2="6" stroke="#FFC94D" stroke-width="4" stroke-linecap="round"/>
    <circle cx="60" cy="5" r="6" fill="#FF7AA2"><animate attributeName="cy" values="5;1;5" dur="1.4s" repeatCount="indefinite"/></circle>`;
  return `<svg width="${size}" height="${size}" viewBox="-4 -8 128 124">
    ${antenna}
    <rect x="22" y="18" width="76" height="62" rx="20" fill="${bodyCol}"/><rect x="30" y="26" width="60" height="42" rx="14" fill="#EDE7FF"/>
    ${eyes}${mouth}
    <circle cx="36" cy="54" r="4" fill="#FF9FBB" opacity=".7"/><circle cx="84" cy="54" r="4" fill="#FF9FBB" opacity=".7"/>
    <rect x="34" y="80" width="52" height="30" rx="12" fill="${bodyCol}" opacity=".85"/>
    <circle cx="48" cy="95" r="4" fill="#EDE7FF"/><circle cx="60" cy="95" r="4" fill="#EDE7FF"/><circle cx="72" cy="95" r="4" fill="#EDE7FF"/>
    <rect x="16" y="84" width="14" height="8" rx="4" fill="${bodyCol}"/><rect x="90" y="84" width="14" height="8" rx="4" fill="${bodyCol}"/>
    ${hat}</svg>`;
}
function ring(pct, color, size){
  size = size||46; const r=(size-8)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#EDE7F7" stroke-width="6"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" font-family="Baloo 2,sans-serif" font-weight="800" font-size="${size*0.3}" fill="${color}">${pct}%</text></svg>`;
}

/* ---------------- VOICE / AUDIO ---------------- */
let muted=false, voice=null, rate=0.95, allVoices=[];
function lsGet(k){ try{return localStorage.getItem(k)}catch(e){return null} }
function lsSet(k,v){ try{localStorage.setItem(k,v)}catch(e){} }
function rankScore(v){ const n=(v.name||'').toLowerCase(); let s=0;
  if(/en(-|_)?(us|gb|au)/i.test(v.lang)) s+=3; else if(/^en/i.test(v.lang)) s+=1;
  if(n.includes('google')) s+=7; if(n.includes('natural')) s+=7;
  if(/samantha|aria|jenny|libby|sonia|emma|zira|karen|moira/.test(n)) s+=5;
  if(n.includes('female')) s+=3; if(v.localService===false) s+=1; return s; }
function loadVoices(){ if(!('speechSynthesis' in window)) return;
  allVoices=speechSynthesis.getVoices();
  const en=allVoices.filter(v=>/^en/i.test(v.lang)); const pool=en.length?en:allVoices;
  const saved=lsGet('ak_voice'); let ch=saved?pool.find(v=>v.name===saved):null;
  if(!ch) ch=pool.slice().sort((a,b)=>rankScore(b)-rankScore(a))[0]||null;
  voice=ch||allVoices[0]||null; buildVoiceSelect(); }
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function buildVoiceSelect(){ const sel=document.getElementById('voiceSel'); if(!sel) return;
  const en=allVoices.filter(v=>/^en/i.test(v.lang)).sort((a,b)=>rankScore(b)-rankScore(a));
  const rest=allVoices.filter(v=>!/^en/i.test(v.lang)); const list=en.concat(rest);
  sel.innerHTML=list.map(v=>`<option value="${(v.name||'').replace(/"/g,'')}" ${voice&&v.name===voice.name?'selected':''}>${v.name} (${v.lang})</option>`).join("");
  const sp=document.getElementById('speedSel'); if(sp) sp.value=String(rate); }
function speak(text,opts){ if(muted||!('speechSynthesis' in window)||!text) return; opts=opts||{};
  try{ speechSynthesis.cancel();
    setTimeout(()=>{ try{ const u=new SpeechSynthesisUtterance(text);
      if(voice) u.voice=voice; u.rate=opts.rate||rate; u.pitch=opts.pitch||1.12; u.volume=1;
      speechSynthesis.resume(); speechSynthesis.speak(u);
    }catch(e){} },110);
  }catch(e){} }
function speakThen(text, cb, opts){ opts=opts||{}; cb=cb||function(){};
  const minWait=Math.max(1900, (text?text.length:0)*95 + 700);
  if(muted || !('speechSynthesis' in window) || !text){ setTimeout(cb, 1500); return; }
  let done=false; const go=()=>{ if(done) return; done=true; cb(); };
  try{ speechSynthesis.cancel(); }catch(e){}
  setTimeout(()=>{ let u; try{ u=new SpeechSynthesisUtterance(text); }catch(e){ setTimeout(go,1200); return; }
    if(voice) u.voice=voice; u.rate=opts.rate||rate; u.pitch=opts.pitch||1.12; u.volume=1;
    u.onend=()=>setTimeout(go,350); u.onerror=()=>setTimeout(go,350);
    try{ speechSynthesis.resume(); speechSynthesis.speak(u); }catch(e){ setTimeout(go,1000); }
  },110);
  setTimeout(go, minWait); }
let actx=null;
function chime(notes,type){ if(muted) return;
  try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    if(!actx) actx=new AC(); if(actx.state==='suspended') actx.resume();
    let t=actx.currentTime;
    notes.forEach(([f,d])=>{ const o=actx.createOscillator(),g=actx.createGain();
      o.type=type||'sine'; o.frequency.value=f;
      g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.25,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+d); t+=d*.9; });
  }catch(e){} }
const happy=()=>chime((typeof THEMES!=='undefined'&&THEMES[curTheme]&&THEMES[curTheme].win)||[[523,.12],[659,.12],[784,.12],[1047,.22]]);
const oops =()=>chime([[300,.18],[220,.22]],'triangle');
const pop  =()=>chime([[660,.07]]);
const ding =()=>chime([[880,.09],[1175,.14]]);
const flip =()=>chime([[520,.06]]);

/* ---------------- PROGRESS / CONFIDENCE ---------------- */
let totalStars=parseInt(lsGet('ak_stars')||'0',10)||0;
function addStars(n){ totalStars+=n; lsSet('ak_stars',String(totalStars)); const el=document.getElementById('totalStars'); if(el) el.textContent=totalStars; }
function getProg(){ try{return JSON.parse(lsGet('ak_prog')||'{}')}catch(e){return{}} }
function saveProg(p){ lsSet('ak_prog',JSON.stringify(p)); }
function recordResult(topicId,total,firstTryCorrect){
  const p=getProg(); const cur=p[topicId]||{plays:0,best:0};
  const acc= total? Math.max(0,Math.min(1,firstTryCorrect/total)) : 0;
  cur.plays=(cur.plays||0)+1; cur.best=Math.max(cur.best||0,acc); cur.last=acc;
  p[topicId]=cur; saveProg(p); }
function conf(acc,plays){
  if(!plays) return {label:"New",color:"#B7AEC9",pct:0};
  const pct=Math.round(acc*100);
  if(acc>=0.95) return {label:"Champion",color:"#22C55E",pct};
  if(acc>=0.75) return {label:"Confident",color:"#3B82F6",pct};
  if(acc>=0.5)  return {label:"Learning",color:"#F5A623",pct};
  return {label:"Starting",color:"#EF4444",pct};
}
function allTopics(){ const arr=[]; for(const k in CONTENT){ CONTENT[k].topics.forEach(t=>arr.push({sec:k,secTitle:CONTENT[k].title,secColor:CONTENT[k].color,topic:t})); } return arr; }
function topicCount(t){ return t.type==='order'?t.rounds.length : t.type==='memory'?1 : t.type==='tapcount'?t.rounds.length : (t.questions?t.questions.length:0); }

/* ---------------- CONFETTI ---------------- */
function confetti(){ const box=document.getElementById('confetti'); const items=['⭐','✨','🌟','🎈','🎊','🎉'];
  for(let i=0;i<26;i++){ const s=document.createElement('span'); s.className='conf'; s.textContent=items[i%items.length];
    s.style.left=Math.random()*100+'%'; s.style.fontSize=(18+Math.random()*22)+'px';
    const dur=1.4+Math.random()*1.2, delay=Math.random()*.3;
    s.style.animation=`confFall ${dur}s ${delay}s ease-in forwards`; box.appendChild(s);
    setTimeout(()=>s.remove(),(dur+delay)*1000+200); } }
const cfStyle=document.createElement('style'); cfStyle.textContent="@keyframes confFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(540deg);opacity:0}} .floaty{animation:floaty 3s ease-in-out infinite;display:inline-block} @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}"; document.head.appendChild(cfStyle);

/* ---------------- ROUTER ---------------- */
const view=document.getElementById('view');
let currentTab='home';
let curLevel=1;
function setLevel(key,lv){ curLevel=lv; renderSection(key); }
function setTab(tab){ currentTab=tab; document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab)); }
function showNav(on){ if(on){ stopReading(); } document.getElementById('nav').style.display=on?'flex':'none'; }
document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>{
  const tab=b.dataset.tab;
  if(tab==='settings'){ openSettings(); return; }
  if(tab==='home') renderHome();
  if(tab==='report') renderReport();
  if(tab==='rewards') renderRewards();
}));

/* ---------------- HOME ---------------- */
const SECGRAD={ algorithms:'linear-gradient(135deg,#8B6BFF,#6D9CFF)', data:'linear-gradient(135deg,#2FD3A5,#22B07A)', olympiad:'linear-gradient(135deg,#FDB646,#F5872A)' };
function renderHome(){ setTab('home'); showNav(true); curLevel=1; window.scrollTo(0,0);
  const prog=getProg();
  let worlds='';
  for(const key in CONTENT){ const s=CONTENT[key];
    const tps=s.topics; const done=tps.filter(t=>(prog[t.id]&&prog[t.id].plays)).length;
    worlds+=`<button class="kbtn world" onclick="renderSection('${key}')">
      <span class="strip" style="background:${s.color}"></span>
      <span class="ic" style="background:${s.color}22">${s.emoji}</span>
      <span><span class="t" style="color:${s.color}">${s.title}</span><span class="s">${s.subtitle}</span>
        <span class="s" style="color:${s.color};margin-top:4px">${done}/${tps.length} games played</span></span>
      <span class="go">›</span></button>`;
  }
  const rd=readiness(); const st=getStreak();
  view.innerHTML=`<div class="screen">
    <div class="hero"><div class="bubbles"><span class="bub" style="width:90px;height:90px;top:-20px;right:-10px"></span><span class="bub" style="width:50px;height:50px;bottom:-10px;left:30%"></span></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="flex:1"><h2>Hi, champion! 👋</h2><p>Ready to learn and play today?</p></div>
        <div style="text-align:center;background:rgba(255,255,255,.2);border-radius:16px;padding:8px 12px">
          <div style="font-size:24px">🔥</div><div style="font-family:var(--head);font-weight:800;font-size:20px;line-height:1">${st.count}</div>
          <div style="font-size:10px;font-weight:800;opacity:.9">day streak</div></div>
      </div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:10px">
        <div style="flex:1"><div style="font-size:13px;font-weight:800;opacity:.9">Olympiad readiness</div>
          <div class="meter" style="background:rgba(255,255,255,.3)"><div style="width:${rd}%"></div></div></div>
        <div style="font-family:var(--head);font-weight:800;font-size:26px">${rd}%</div>
      </div></div>
    <div class="quick">
      <button class="kbtn qtile" style="background:linear-gradient(135deg,#FDB646,#F5872A)" onclick="startSmartPractice()"><span class="qe">🎯</span>Smart<br>Practice</button>
      <button class="kbtn qtile" style="background:linear-gradient(135deg,#EC4899,#F0708F)" onclick="startChallengePick()"><span class="qe">⏱️</span>Timed<br>Challenge</button>
      <button class="kbtn qtile" style="background:linear-gradient(135deg,#7C5CFC,#6D9CFF)" onclick="renderRewards()"><span class="qe">🏆</span>My<br>Rewards</button>
    </div>
    <button class="kbtn installbtn" id="installBtn" style="display:none" onclick="doInstall()">📲 Install App</button>
    <div class="sec-title">Choose a world</div>
    <div class="worlds-grid">${worlds}</div>
    <button class="kbtn world" style="justify-content:center;color:var(--purple);font-family:var(--head);font-weight:800;font-size:17px;margin-top:14px" onclick="renderReport()">📊 See my progress report</button>
  </div>`;
  updateInstall();
}

/* ---------------- SECTION ---------------- */
function levelStats(s,prog,lv){ const ts=s.topics.filter(t=>(t.level||1)===lv); let played=0,sum=0;
  ts.forEach(t=>{ const pr=prog[t.id]; if(pr&&pr.plays){ played++; sum+=pr.best; } });
  return {count:ts.length, played, avg: played? sum/played : 0}; }
function levelUnlocked(s,prog,lv){ if(lv<=1) return true; const p=levelStats(s,prog,lv-1); return p.played>=3 && p.avg>=0.5; }
function renderSection(key){ setTab('home'); showNav(true); window.scrollTo(0,0);
  const s=CONTENT[key]; const prog=getProg();
  const maxLevel = Math.max.apply(null, s.topics.map(t=>t.level||1));
  if(curLevel>maxLevel) curLevel=1;
  const unlocked = levelUnlocked(s,prog,curLevel);
  const topics = s.topics.filter(t=>(t.level||1)===curLevel);
  let lastGroup=null, html='';
  const LNAME={1:'Level 1 · Basics',2:'Level 2 · Challenge',3:'Level 3 · Master'};
  if(!unlocked){
    html=`<div class="lockmsg"><div style="font-size:44px">🔒</div>
      <div style="font-family:var(--head);font-weight:800;font-size:19px;margin-top:8px">${LNAME[curLevel]} is almost ready!</div>
      <p style="color:var(--muted);font-weight:700;margin-top:6px;font-size:14px">Play at least 3 games in the level below and score well to unlock these harder challenges. You can do it, champion! 💪</p>
      <button class="kbtn fbtn fbtn-primary" style="margin-top:16px;font-size:18px;padding:14px" onclick="setLevel('${key}',${curLevel-1})"><span class="shine"></span>▶ Play Level ${curLevel-1}</button></div>`;
  } else {
    html+=`<div class="topics-grid">`;
    topics.forEach(t=>{
      if(t.group&&t.group!==lastGroup){ html+=`<div class="grouphdr">${t.group}<span class="line"></span></div>`; lastGroup=t.group; }
      const pr=prog[t.id]||{plays:0,best:0}; const c=conf(pr.best,pr.plays);
      const gt = t.type==='order'?'🎮 Order game': t.type==='memory'?'🧠 Memory game': t.type==='tapcount'?'👆 Tap game': t.type==='truefalse'?'✅ True or False':'❓ '+topicCount(t)+' questions';
      html+=`<button class="kbtn topic" onclick="startTopic('${key}','${t.id}')">
        <span class="ic" style="background:${t.color}22">${t.emoji}</span>
        <span class="mid"><span class="t">${t.title}</span>
          <span class="meta">${gt} <span class="badge" style="background:${c.color}">${c.label}</span></span></span>
        ${ring(c.pct,c.color)}</button>`;
    });
    html+=`</div>`;
    if(!topics.length) html=`<div class="lockmsg"><div style="font-size:40px">✨</div><p style="color:var(--muted);font-weight:700;margin-top:8px">More games coming here soon!</p></div>`;
  }
  let segs='';
  for(let lv=1; lv<=maxLevel; lv++){ const ul=levelUnlocked(s,prog,lv);
    segs+=`<button class="seg ${curLevel===lv?'active':''}" onclick="setLevel('${key}',${lv})">L${lv}${ul?'':' <span class="lk">🔒</span>'}</button>`; }
  const toggle = maxLevel>1 ? `<div class="segwrap">${segs}</div>` : '';
  view.innerHTML=`<div class="screen">
    <div class="hero" style="background:${SECGRAD[key]||'linear-gradient(135deg,#7C5CFC,#6D9CFF)'}">
      <h2>${s.emoji} ${s.title}</h2><p>${s.subtitle}</p></div>
    ${toggle}
    <div class="quick" style="grid-template-columns:1fr 1fr">
      <button class="kbtn qtile" style="background:linear-gradient(135deg,#FDB646,#F5872A)" onclick="startSmartPractice('${key}')"><span class="qe">🎯</span>Practice weak spots</button>
      <button class="kbtn qtile" style="background:linear-gradient(135deg,#EC4899,#F0708F)" onclick="startChallenge('${key}')"><span class="qe">⏱️</span>Timed challenge</button>
    </div>

    ${html}
    <button class="kbtn backbtn" onclick="renderHome()">‹ Back to worlds</button>

}

/* ---------------- REPORT ---------------- */
function readiness(){ const p=getProg(); const all=allTopics(); let sum=0,n=0;
  all.forEach(x=>{ const pr=p[x.topic.id]; if(pr&&pr.plays){ sum+=pr.best; n++; } });
  if(!n) return 0; const covered=n/all.length; return Math.round((sum/n)*covered*100); }
function renderReport(){ setTab('report'); showNav(true); window.scrollTo(0,0);
  const p=getProg(); const rd=readiness();
  let body='';
  for(const key in CONTENT){ const s=CONTENT[key];
    let rows=''; let sum=0,n=0;
    s.topics.forEach(t=>{ const pr=p[t.id]||{plays:0,best:0}; const c=conf(pr.best,pr.plays);
      if(pr.plays){ sum+=pr.best; n++; }
      rows+=`<div class="rrow"><span style="font-size:22px">${t.emoji}</span>
        <span class="rn">${t.title}</span>
        <span class="rmini"><div style="width:${c.pct}%;background:${c.color}"></div></span>
        <span class="badge" style="background:${c.color};min-width:74px;text-align:center">${pr.plays?c.label:'—'}</span></div>`;
    });
    const avg=n?Math.round((sum/n)*100):0;
    body+=`<div class="sec-title" style="display:flex;justify-content:space-between"><span>${s.emoji} ${s.title}</span><span style="color:${s.color}">${avg}%</span></div><div class="rcard">${rows}</div>`;
  }
  let tip;
  if(rd>=85) tip="Outstanding! Your child is leading and olympiad-ready. 🏆";
  else if(rd>=60) tip="Great progress! Keep practising the orange topics to reach Champion.";
  else if(rd>0) tip="Good start! Play a bit each day — confidence will climb fast.";
  else tip="Play a few games to unlock your progress report!";
  view.innerHTML=`<div class="screen">
    <div class="readiness"><div style="font-family:var(--head);font-weight:800;font-size:20px">Olympiad Readiness</div>
      <div style="font-family:var(--head);font-weight:800;font-size:44px;color:var(--purple);margin-top:4px">${rd}%</div>
      <div class="meter"><div style="width:${rd}%"></div></div>
      <p style="color:var(--muted);font-weight:700;margin-top:12px;font-size:14px">${tip}</p>
      <div style="margin-top:12px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:800">
        <span class="badge" style="background:#EF4444">Starting</span><span class="badge" style="background:#F5A623">Learning</span>
        <span class="badge" style="background:#3B82F6">Confident</span><span class="badge" style="background:#22C55E">Champion</span></div>
    </div>
    ${body}
    <button class="kbtn backbtn" onclick="renderHome()">‹ Back home</button>
  </div>`;
}

/* ---------------- GAME DISPATCH ---------------- */
let G=null;
function startTopic(key,topicId){ const s=CONTENT[key]; const t=s.topics.find(x=>x.id===topicId);
  showNav(false); window.scrollTo(0,0);
  if(t.type==='order') return startOrder(key,t);
  if(t.type==='memory') return startMemory(key,t);
  if(t.type==='tapcount') return startTap(key,t);
  if(t.type==='truefalse') return startTF(key,t);
  return startQuiz(key,t);
}
function gameHead(t,accent,cur,total,stars){
  const tm = (typeof G!=='undefined' && G && G.timed) ? `<span id="timer" class="timerchip">⏱️ ${G.timeLeft}s</span>` : '';
  return `<div class="qhead"><button class="kbtn readbtn" style="background:${accent}" onclick="exitGame()">‹</button>
    <span class="ttl" style="color:${accent}">${t.emoji} ${t.title}</span>${tm}</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div class="pbar"><div style="width:${total?(cur/total)*100:0}%;background:${accent}"></div></div>
      <span style="font-family:var(--head);font-weight:800;color:${accent}">⭐ ${stars}</span></div>`;
}
function exitGame(){ clearGTimer(); if(CONTENT[G.key]) renderSection(G.key); else renderHome(); }

/* ---------------- MCQ ---------------- */
function startQuiz(key,topic){ G={key,topic,accent:topic.color,idx:0,stars:0,solved:false,wrongThis:false,firstTry:0}; renderQuiz(); }
function renderQuiz(){ const {topic,accent,idx,stars}=G; const q=topic.questions[idx];
  const order=shuffle(q.options.map((o,i)=>i));
  G.disp=order.map(i=>q.options[i]); G.correctDisp=order.indexOf(q.correct); G.scene=q.scene||null; G.sceneData=q.sceneData||null;
  const opts=G.disp.map((o,i)=>`<button class="kbtn opt" onclick="answer(${i})"><span class="oe">${o.ic&&typeof ICONS!=='undefined'&&ICONS[o.ic]?ICONS[o.ic]():o.d}</span><span class="ot">${o.t}</span></button>`).join("");
  const visual = q.scene&&typeof SCENES!=='undefined'&&SCENES[q.scene]
    ? `<div class="qscene" id="qscene">${SCENES[q.scene]('', q.sceneData)}</div>`
    : `<div class="qbig">${q.big||''}</div>`;
  view.innerHTML=`<div class="screen">${gameHead(topic,accent,idx,topic.questions.length,stars)}
    <div class="qcard"><div class="qrow"><p class="qtext">${q.q}</p>
      <button class="kbtn readbtn" style="background:${accent}" onclick="speak(${JSON.stringify(q.q).replace(/"/g,'&quot;')})">🔊</button></div>
      ${visual}</div>
    <div class="bwrap" id="bw"></div><div id="opts">${opts}</div></div>`;
  G.wrongThis=false; readQuestionAndOptions(q, G.disp);
}
function answer(i){ if(G.solved) return; stopReading(); pop();
  const opt=G.disp[i]; if(opt&&opt.hi&&typeof setSceneHighlight==='function') setSceneHighlight(opt.hi);
  const btns=document.querySelectorAll('#opts .opt'); const bw=document.getElementById('bw');
  if(i===G.correctDisp){ G.solved=true; G.stars++; if(!G.wrongThis) G.firstTry++;
    const pr=PRAISES[Math.floor(Math.random()*PRAISES.length)];
    btns[i].classList.remove('reading'); btns[i].style.borderColor='#22C55E'; btns[i].style.background='#DCFCE7'; btns[i].innerHTML+='<span style="font-size:26px">✅</span>';
    bw.innerHTML=`<div class="banner" style="background:#DCFCE7">${pr}</div>`; confetti(); partyCharacters(); happy(); speakThen(opt.t+". "+pr, nextQ, {pitch:1.3});
  } else { G.wrongThis=true; recordMiss(G.topic.id, G.idx); const ch=CHEERS[Math.floor(Math.random()*CHEERS.length)];
    btns[i].style.borderColor='#EF4444'; btns[i].style.background='#FEE2E2';
    bw.innerHTML=`<div class="banner" style="background:#FEF3C7">${ch}</div>`; oops(); speak(opt.t+". "+ch);
    setTimeout(()=>{ btns[i].style.borderColor='transparent'; btns[i].style.background='#fff'; bw.innerHTML=''; },1300);
  }
}
function nextQ(){ if(G.idx+1<G.topic.questions.length){ G.idx++; G.solved=false; renderQuiz(); }
  else finish(G.topic.questions.length, G.firstTry); }

/* ---------------- ORDER ---------------- */
function startOrder(key,topic){ G={key,topic,accent:topic.color,ri:0,stars:0,firstTry:0}; setupRound(); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function setupRound(){ const r=G.topic.rounds[G.ri]; G.expected=r.items.slice().sort((a,b)=>a.v-b.v).map(x=>x.v); G.pos=0; G.err=false; G.shuf=shuffle(r.items); renderOrder(); }
function renderOrder(){ const {topic,accent,ri}=G; const r=topic.rounds[ri];
  const tiles=G.shuf.map((it,i)=>`<button class="kbtn tile" id="t${i}" onclick="tapOrder(${it.v},${i})">${it.d}</button>`).join("");
  view.innerHTML=`<div class="screen">${gameHead(topic,accent,ri,topic.rounds.length,G.stars)}
    <div class="qcard"><div class="qrow"><p class="qtext">${r.q}</p>
      <button class="kbtn readbtn" style="background:${accent}" onclick="speak(${JSON.stringify(r.q).replace(/"/g,'&quot;')})">🔊</button></div></div>
    <div class="bwrap" id="bw"></div><div class="tiles">${tiles}</div></div>`;
  setTimeout(()=>speak(r.q),300);
}
function tapOrder(v,i){ const btn=document.getElementById('t'+i); if(!btn||btn.dataset.done) return; const bw=document.getElementById('bw');
  if(v===G.expected[G.pos]){ btn.dataset.done="1"; btn.style.borderColor='#22C55E'; btn.style.background='#DCFCE7'; btn.style.opacity=.85; ding();
    const it=G.shuf.find(x=>x.v===v); speak(it&&it.say?it.say:String(v)); G.pos++;
    if(G.pos>=G.expected.length){ G.stars++; if(!G.err) G.firstTry++;
      const pr=PRAISES[Math.floor(Math.random()*PRAISES.length)]; bw.innerHTML=`<div class="banner" style="background:#DCFCE7">${pr}</div>`;
      confetti(); happy(); setTimeout(()=>speak(pr,{pitch:1.3}),350); setTimeout(nextRound,1750); }
  } else { G.err=true; btn.style.borderColor='#EF4444'; btn.style.background='#FEE2E2';
    const ch=CHEERS[Math.floor(Math.random()*CHEERS.length)]; bw.innerHTML=`<div class="banner" style="background:#FEF3C7">${ch}</div>`; oops(); speak(ch);
    setTimeout(()=>{ btn.style.borderColor='transparent'; btn.style.background='#fff'; bw.innerHTML=''; },1100);
  }
}
function nextRound(){ if(G.ri+1<G.topic.rounds.length){ G.ri++; setupRound(); } else finish(G.topic.rounds.length,G.firstTry); }

/* ---------------- MEMORY ---------------- */
function startMemory(key,topic){ G={key,topic,accent:topic.color,stars:0,flip:[],matched:0,moves:0,miss:0};
  const cards=[]; topic.pairs.forEach((p,idx)=>{ cards.push({pid:idx,face:p[0],say:p.say||p[0]}); cards.push({pid:idx,face:p[1],say:p.say2||p[1]}); });
  G.cards=shuffle(cards); renderMemory(); speak(topic.intro||"Find the matching pairs!"); }
function renderMemory(){ const {topic,accent}=G;
  const grid=G.cards.map((c,i)=>{ const st=c.matched?'matched':(G.flip.includes(i)?'flipped':'');
    return `<button class="kbtn mcard ${st}" id="m${i}" onclick="tapMem(${i})">${(c.matched||G.flip.includes(i))?c.face:'<span class=q>?</span>'}</button>`; }).join("");
  view.innerHTML=`<div class="screen">${gameHead(topic,accent,G.matched,topic.pairs.length,G.stars)}
    <div class="qcard" style="padding:14px"><p class="qtext" style="font-size:18px">${topic.intro||'Match the pairs!'}</p></div>
    <div class="bwrap" id="bw"></div><div class="mgrid">${grid}</div></div>`;
}
function tapMem(i){ const c=G.cards[i]; if(c.matched||G.flip.includes(i)||G.flip.length>=2) return; flip(); G.flip.push(i);
  const el=document.getElementById('m'+i); el.classList.add('flipped'); el.innerHTML=c.face; speak(c.say);
  if(G.flip.length===2){ G.moves++; const [a,b]=G.flip;
    if(G.cards[a].pid===G.cards[b].pid){ G.cards[a].matched=G.cards[b].matched=true; G.matched++; ding();
      setTimeout(()=>{ document.getElementById('m'+a).classList.add('matched'); document.getElementById('m'+b).classList.add('matched'); G.flip=[];
        if(G.matched>=G.topic.pairs.length){ G.stars=G.topic.pairs.length; const acc=Math.max(0.3,1-G.miss*0.12); confetti(); happy();
          setTimeout(()=>finishCustom(G.topic.pairs.length, acc*G.topic.pairs.length, "You matched them all! 🎉"),600); }
      },500);
    } else { G.miss++; oops();
      setTimeout(()=>{ const ea=document.getElementById('m'+a),eb=document.getElementById('m'+b);
        ea.classList.remove('flipped'); eb.classList.remove('flipped'); ea.innerHTML='<span class=q>?</span>'; eb.innerHTML='<span class=q>?</span>'; G.flip=[]; },850);
    }
  }
}

/* ---------------- TAP-COUNT ---------------- */
function startTap(key,topic){ G={key,topic,accent:topic.color,ri:0,stars:0,firstTry:0}; setupTap(); }
function setupTap(){ const r=G.topic.rounds[G.ri]; G.target=r.n; G.tapped=0; G.err=false;
  const total=r.total||(r.n+ (r.extra||2)); G.field=shuffle(Array.from({length:total},(_,i)=>({i, on:i<r.n?false:false}))); renderTap(); }
function renderTap(){ const {topic,accent,ri}=G; const r=topic.rounds[ri];
  const items=G.field.map((f,i)=>`<button class="kbtn tile" id="f${i}" onclick="tapItem(${i})">${r.emoji}</button>`).join("");
  view.innerHTML=`<div class="screen">${gameHead(topic,accent,ri,topic.rounds.length,G.stars)}
    <div class="qcard"><div class="qrow"><p class="qtext">${r.q}</p>
      <button class="kbtn readbtn" style="background:${accent}" onclick="speak(${JSON.stringify(r.q).replace(/"/g,'&quot;')})">🔊</button></div>
      <div style="font-family:var(--head);font-weight:800;color:${accent};margin-top:8px">Tapped: <span id="cnt">0</span> / ${r.n}</div></div>
    <div class="bwrap" id="bw"></div><div class="tiles">${items}</div></div>`;
  setTimeout(()=>speak(r.q),300);
}
function tapItem(i){ const btn=document.getElementById('f'+i); if(!btn||btn.dataset.on) return; const bw=document.getElementById('bw');
  btn.dataset.on="1"; btn.style.borderColor=G.accent; btn.style.background=G.accent+'22'; pop(); G.tapped++;
  document.getElementById('cnt').textContent=G.tapped; speak(String(G.tapped));
  if(G.tapped===G.target){ G.stars++; if(!G.err) G.firstTry++; const pr=PRAISES[Math.floor(Math.random()*PRAISES.length)];
    bw.innerHTML=`<div class="banner" style="background:#DCFCE7">${pr}</div>`; confetti(); happy(); setTimeout(()=>speak(pr,{pitch:1.3}),350); setTimeout(nextTap,1750);
  } else if(G.tapped>G.target){ G.err=true; const ch="Oops, too many! Let's try again."; bw.innerHTML=`<div class="banner" style="background:#FEF3C7">${ch}</div>`; oops(); speak(ch);
    setTimeout(setupTap,1300);
  }
}
function nextTap(){ if(G.ri+1<G.topic.rounds.length){ G.ri++; setupTap(); } else finish(G.topic.rounds.length,G.firstTry); }

/* ---------------- FINISH ---------------- */
function finish(count,firstTry){ finishCustom(count,firstTry,"You are a Class 1 champion!"); }
function finishCustom(count,firstTryScore,msg){ clearGTimer(); const {topic,accent}=G;
  addStars(G.stars);
  const synthetic = !CONTENT[G.key];
  if(!synthetic) recordResult(topic.id,count,firstTryScore);
  bumpStreak();
  const pr=getProg()[topic.id]||{plays:0,best: (count?firstTryScore/count:0)}; const c=conf(pr.best,pr.plays||1);

    ? `<button class="kbtn fbtn fbtn-accent" onclick="${G.replay||'renderHome()'}"><span class="shine"></span><span class="fic">🔁</span> Play Again</button>`

  const moreBtn = synthetic
    ? `<button class="kbtn fbtn fbtn-primary" onclick="renderHome()"><span class="shine"></span><span class="fic">🎮</span> More Games</button>`
    : `<button class="kbtn fbtn fbtn-primary" onclick="renderSection('${G.key}')"><span class="shine"></span><span class="fic">🎮</span> More Games</button>`;
  const badgeHtml = newBadges.length ? `<div style="margin-top:14px;background:#FFF7E6;border-radius:16px;padding:12px;box-shadow:var(--shadow)">

      <div style="font-size:30px;margin-top:4px">${newBadges.map(b=>b.emoji).join(' ')}</div>
      <div style="font-weight:800;font-size:13px;margin-top:2px">${newBadges.map(b=>b.name).join(', ')}</div></div>` : '';
  view.innerHTML=`<div class="screen" style="text-align:center;padding-top:24px">
    ${robot(150,'celebrate')}
    <h2 style="font-family:var(--head);font-size:32px;color:${accent};margin:8px 0">You did it! 🎉</h2>
    <div style="font-size:36px;margin:4px 0 10px">${"⭐".repeat(Math.min(count,8))}</div>
    <p style="color:var(--muted);font-weight:800;margin-bottom:6px">${msg}</p>
    <div style="display:inline-flex;align-items:center;gap:10px;background:#fff;border-radius:18px;padding:12px 18px;box-shadow:var(--shadow);margin-top:6px">
      ${ring(c.pct,c.color,54)}<div style="text-align:left"><div style="font-family:var(--head);font-weight:800">${topic.title}</div>
      <div style="font-weight:800;color:${c.color}">${c.label}</div></div></div>
    ${badgeHtml}
    <div class="fbtns">
      ${againBtn}
      ${moreBtn}
      <button class="kbtn fbtn fbtn-ghost" onclick="renderHome()"><span class="fic">🏠</span> Home</button>
    </div>
  </div>`;
  setTimeout(()=>speak(`Hooray! ${msg} You earned ${G.stars} stars.`,{pitch:1.3}),300);
}

function runDiagnostic(){ if(!('speechSynthesis' in window)){ setDiag("not supported ✗",0); return; }
  const synth=speechSynthesis;
  const run=()=>{ const vs=synth.getVoices(); let started=false; setDiag("testing…",vs.length);
    try{ synth.cancel(); const u=new SpeechSynthesisUtterance("Hi! I am Algo. Let's become an olympiad champion!");
      if(voice) u.voice=voice; else { const v=vs.find(x=>/^en/i.test(x.lang))||vs[0]; if(v) u.voice=v; }
      u.rate=rate; u.pitch=1.12; u.onstart=()=>{ started=true; setDiag("working ✓",vs.length); };
      u.onend=()=>setDiag(started?"working ✓":"no audio ✗",vs.length); u.onerror=e=>setDiag("error ("+(e.error||'?')+") ✗",vs.length);
      synth.resume(); synth.speak(u); setTimeout(()=>{ if(!started) setDiag("blocked ✗",vs.length); },1600);
    }catch(e){ setDiag("error ✗",vs.length); } };
  if(synth.getVoices().length===0){ setDiag("testing…",0); const h=()=>{ synth.removeEventListener('voiceschanged',h); loadVoices(); run(); };

}

<script>
/* ================= STREAK & TIME ================= */
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function getStreak(){ try{ return JSON.parse(lsGet('ak_streak')||'{"count":0,"last":""}'); }catch(e){ return {count:0,last:''}; } }
function bumpStreak(){ const s=getStreak(); const t=todayStr(); if(s.last===t) return s;
  const y=new Date(); y.setDate(y.getDate()-1); const ys=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
  s.count=(s.last===ys)?(s.count||0)+1:1; s.last=t; lsSet('ak_streak',JSON.stringify(s)); return s; }
let timeInt=null;
function startTimeTracking(){ if(timeInt) return; timeInt=setInterval(()=>{ if(document.hidden) return;
  try{ let t=parseInt(lsGet('ak_time')||'0',10)||0; lsSet('ak_time',String(t+5));
    let m={}; try{m=JSON.parse(lsGet('ak_timeday')||'{}')}catch(e){} const d=todayStr(); m[d]=(m[d]||0)+5; lsSet('ak_timeday',JSON.stringify(m)); }catch(e){} },5000); }
function getTotalTime(){ return parseInt(lsGet('ak_time')||'0',10)||0; }
function fmtTime(s){ const m=Math.floor(s/60), h=Math.floor(m/60); if(h>0) return h+'h '+(m%60)+'m'; return m+'m'; }

/* ================= BACKGROUND MUSIC ================= */
let musicInt=null, musicStep=0;
const MSCALE=[523.25,587.33,659.25,783.99,880.00,659.25,587.33,523.25];
function startMusic(){ if(!musicOn) return; try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; if(!actx) actx=new AC(); if(actx.state==='suspended') actx.resume(); }catch(e){ return; }
  if(musicInt) return;
  musicInt=setInterval(()=>{ if(muted||!musicOn||!actx) return; try{ const sc=(typeof THEMES!=='undefined'&&THEMES[curTheme]&&THEMES[curTheme].mus)||MSCALE; const f=sc[musicStep%sc.length]; musicStep++;
    const o=actx.createOscillator(), g=actx.createGain(); o.type='sine'; o.frequency.value=f;
    const t=actx.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.05,t+0.4); g.gain.exponentialRampToValueAtTime(0.0001,t+1.4);
    o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+1.5); }catch(e){} },1400); }
function stopMusic(){ if(musicInt){ clearInterval(musicInt); musicInt=null; } }

function badgeStats(){ const p=getProg(); const all=allTopics(); let playedCount=0,champions=0,hasPerfect=false,maxLevelPlayed=1; const worldsSet={};

  let mathSum=0,mathPlayed=0; if(CONTENT.olympiad) CONTENT.olympiad.topics.forEach(t=>{ if((t.group||'').indexOf('Math')>=0){ const pr=p[t.id]; if(pr&&pr.plays){ mathPlayed++; mathSum+=pr.best; } } });
  return { playedCount, stars:totalStars, champions, hasPerfect, worlds:Object.keys(worldsSet).length, maxLevelPlayed, streak:getStreak().count, mathAvg:mathPlayed?mathSum/mathPlayed:0, mathPlayed }; }

/* ================= TRUE / FALSE ENGINE ================= */
function startTF(key,topic){ G={key,topic,accent:topic.color,idx:0,stars:0,solved:false,wrongThis:false,firstTry:0}; renderTF(); }
function renderTF(){ const {topic,accent,idx,stars}=G; const q=topic.questions[idx];
  view.innerHTML=`<div class="screen">${gameHead(topic,accent,idx,topic.questions.length,stars)}
    <div class="qcard"><div class="qrow"><p class="qtext">${q.q}</p>
      <button class="kbtn readbtn" style="background:${accent}" onclick="speak(${JSON.stringify(q.q).replace(/"/g,'&quot;')})">🔊</button></div>
      <div class="qbig">${q.big||''}</div></div>
    <div class="bwrap" id="bw"></div>
    <div style="display:flex;gap:12px" id="tfopts">
      <button class="kbtn opt" style="justify-content:center;background:#DCFCE7" onclick="answerTF(true)"><span class="oe">✅</span><span class="ot">True</span></button>
      <button class="kbtn opt" style="justify-content:center;background:#FEE2E2" onclick="answerTF(false)"><span class="oe">❌</span><span class="ot">False</span></button></div></div>`;
  G.wrongThis=false; readTFQuestion(q); }
function answerTF(v){ if(G.solved) return; stopReading(); const q=G.topic.questions[G.idx]; pop(); const bw=document.getElementById('bw');
  if(v===q.tf){ G.solved=true; G.stars++; if(!G.wrongThis)G.firstTry++; const pr=PRAISES[Math.floor(Math.random()*PRAISES.length)];
    bw.innerHTML=`<div class="banner" style="background:#DCFCE7">${pr}</div>`; confetti(); partyCharacters(); happy(); speakThen((v?'True. ':'False. ')+pr, function(){ if(G.idx+1<G.topic.questions.length){G.idx++;G.solved=false;renderTF();} else finish(G.topic.questions.length,G.firstTry); }, {pitch:1.3});
  } else { G.wrongThis=true; recordMiss(G.topic.id,G.idx); const ch=CHEERS[Math.floor(Math.random()*CHEERS.length)];
    bw.innerHTML=`<div class="banner" style="background:#FEF3C7">${ch}</div>`; oops(); speak(ch); setTimeout(()=>{ if(bw) bw.innerHTML=''; },1200); } }

let gTimer=null;
function clearGTimer(){ if(gTimer){ clearInterval(gTimer); gTimer=null; } }
function startGTimer(){ clearGTimer(); gTimer=setInterval(()=>{ if(!G||!G.timed){ clearGTimer(); return; } G.timeLeft--;
  const el=document.getElementById('timer'); if(el) el.textContent='⏱️ '+G.timeLeft+'s';
  if(G.timeLeft<=0){ clearGTimer(); finishCustom(G.topic.questions.length, G.firstTry, "Time's up! Great effort!"); } },1000); }
function mcqTopicsFor(key){ const arr=[]; const secs=key?[key]:Object.keys(CONTENT); secs.forEach(k=>{ if(!CONTENT[k]) return; CONTENT[k].topics.forEach(t=>{ if(t.questions && (!t.type||t.type==='mcq'||t.type==='truefalse')) arr.push({k,t}); }); }); return arr; }
function runSynthQuiz(topicObj, replayCall, timed){ showNav(false); window.scrollTo(0,0);
  G={key:'__synth__', topic:topicObj, accent:topicObj.color, idx:0, stars:0, solved:false, wrongThis:false, firstTry:0, replay:replayCall};
  if(timed){ G.timed=true; G.timeLeft=timed; startGTimer(); } renderQuiz(); }
function startSmartPractice(key){ const p=getProg(); const miss=getMiss(); let pool=[];
  mcqTopicsFor(key).forEach(({t})=>{ if(t.type==='truefalse') return; const m=miss[t.id]; if(m){ Object.keys(m).forEach(qi=>{ const q=t.questions[qi]; if(q) pool.push(q); }); } });
  if(pool.length<6) mcqTopicsFor(key).forEach(({t})=>{ if(t.type==='truefalse')return; const pr=p[t.id]; if(pr&&pr.plays) t.questions.forEach(q=>pool.push(q)); });
  if(pool.length<6) mcqTopicsFor(key).forEach(({t})=>{ if(t.type!=='truefalse') t.questions.forEach(q=>pool.push(q)); });
  const qs=shuffle(pool).slice(0,8);
  if(!qs.length){ speak("Play a few games first, then I can make a practice set!"); renderHome(); return; }
  runSynthQuiz({id:'smart',title:'Smart Practice',emoji:'🎯',color:'#F5872A',questions:qs}, key?`startSmartPractice('${key}')`:'startSmartPractice()', 0); }
function startChallenge(key){ let pool=[]; mcqTopicsFor(key).forEach(({t})=>{ if(t.type!=='truefalse') t.questions.forEach(q=>pool.push(q)); });
  const qs=shuffle(pool).slice(0,12); if(!qs.length){ renderHome(); return; }
  runSynthQuiz({id:'chal',title:'Timed Challenge',emoji:'⏱️',color:'#EC4899',questions:qs}, key?`startChallenge('${key}')`:'startChallengePick()', 60); }
function startChallengePick(){ showNav(false); window.scrollTo(0,0);
  const opts=Object.keys(CONTENT).map(k=>`<button class="kbtn world" onclick="startChallenge('${k}')"><span class="ic" style="background:${CONTENT[k].color}22">${CONTENT[k].emoji}</span><span><span class="t" style="color:${CONTENT[k].color}">${CONTENT[k].title}</span><span class="s">Beat the clock!</span></span><span class="go">›</span></button>`).join('');
  view.innerHTML=`<div class="screen"><div class="hero" style="background:linear-gradient(135deg,#EC4899,#F0708F)"><h2>⏱️ Timed Challenge</h2><p>Answer as many as you can in 60 seconds!</p></div>
    <div class="sec-title">Pick a world</div>${opts}
    <button class="kbtn backbtn" onclick="renderHome()">‹ Back home</button></div>`; }

/* ================= AUTO-READ OPTIONS + IDLE BUDDY ================= */
let readSeqId=0, idleTimer=null;
function highlightOption(i){
  document.querySelectorAll('#opts .opt').forEach((b,j)=>b.classList.toggle('reading', j===i));
  document.querySelectorAll('#tfopts .opt').forEach((b,j)=>b.classList.toggle('reading', j===i));

function clearHighlight(){ document.querySelectorAll('.opt.reading').forEach(b=>b.classList.remove('reading')); }
function clearIdle(){ if(idleTimer){ clearTimeout(idleTimer); idleTimer=null; } hideThink(); }
function startIdleTimer(){ clearIdle(); idleTimer=setTimeout(()=>{ if(typeof G!=='undefined'&&G&&!G.solved){ thinkCharacter(); if(!muted) speak("Take your time! Which one do you think is right?"); } }, 9000); }
function stopReading(){ readSeqId++; try{ if('speechSynthesis' in window) speechSynthesis.cancel(); }catch(e){} clearHighlight(); clearIdle(); }
function readSequence(items){ const myId=++readSeqId;
  if(muted || !('speechSynthesis' in window)){ startIdleTimer(); return; }
  let k=0;
  function step(){ if(myId!==readSeqId) return;
    if(k>=items.length){ clearHighlight(); startIdleTimer(); return; }
    const it=items[k++]; highlightOption(it.idx);
    if(typeof setSceneHighlight==='function') setSceneHighlight(it.idx===-1?'':(it.hi||''));
    try{ speechSynthesis.cancel(); }catch(e){}
    let u; try{ u=new SpeechSynthesisUtterance(it.text); }catch(e){ return; }
    if(voice) u.voice=voice; u.rate=rate; u.pitch=1.12; u.volume=1;
    u.onend=()=>{ if(myId===readSeqId) setTimeout(step, it.idx===-1?260:170); };
    u.onerror=()=>{ if(myId===readSeqId) setTimeout(step,160); };
    try{ speechSynthesis.resume(); speechSynthesis.speak(u); }catch(e){ setTimeout(step,160); }
  }
  setTimeout(step,300);
}
function readQuestionAndOptions(q, disp){ readSequence([{text:q.q,idx:-1}].concat(disp.map((o,i)=>({text:o.t,idx:i,hi:o.hi})))); }

function inStandalone(){ try{ return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone===true; }catch(e){ return false; } }
function installAvailable(){ return !inStandalone() && (!!deferredPrompt || isIOS); }
function updateInstall(){ ['installBtn','installBtnSettings'].forEach(id=>{ const b=document.getElementById(id); if(b) b.style.display=installAvailable()?'':'none'; }); }
function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;left:50%;bottom:120px;transform:translateX(-50%);background:#241C3B;color:#fff;padding:12px 18px;border-radius:14px;font-family:Baloo 2,sans-serif;font-weight:700;font-size:14px;z-index:200;max-width:82%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .3s';
    document.body.appendChild(t); }
  t.textContent=msg; requestAnimationFrame(()=>{ t.style.opacity='1'; }); clearTimeout(t._h); t._h=setTimeout(()=>{ t.style.opacity='0'; },4200); }
function doInstall(){
  if(deferredPrompt){ deferredPrompt.prompt(); (deferredPrompt.userChoice||Promise.resolve()).then(()=>{ deferredPrompt=null; updateInstall(); }).catch(()=>{}); }
  else if(isIOS){ toast("To install: tap the Share icon in Safari, then ‘Add to Home Screen’."); }
  else { toast("Open this app from its web link (https) in Chrome, then menu → Install app."); }
}
window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt=e; updateInstall(); });
window.addEventListener('appinstalled', function(){ deferredPrompt=null; updateInstall(); toast("Installed! Look for Algo Kid on your home screen 🎉"); });
</script>

SCENES.sizes=function(hl,data){

SCENES.row=function(hl,data){

SCENES.numline=function(hl,data){

  let ticks=''; for(let v=min;v<=max;v++){ const x=px(v); ticks+=`<line x1="${x.toFixed(1)}" y1="46" x2="${x.toFixed(1)}" y2="54" stroke="#B7AEC9" stroke-width="2"/><text x="${x.toFixed(1)}" y="70" font-size="11" text-anchor="middle" font-family="Baloo 2,sans-serif" font-weight="800" fill="#8B84A3">${v}</text>`; }

  var SYM=['·','❓','➡️','⬅️','⬆️','⬇️','=','+','➕','➖','×','÷','↔️','⏳'];
  function tokens(big){ if(!big) return []; return String(big).split(/\s+/).filter(function(t){ return t && SYM.indexOf(t)<0 && !/^[0-9]+$/.test(t) && !/^[A-Za-z]$/.test(t); }); }
  function numOf(d){ var m=String(d||'').match(/\d+/); return m?parseInt(m[0],10):NaN; }

  /* ---- STACKS (plates) : options mention top / bottom ---- */
  ['stack'].forEach(function(id){ var t=findTopic('data',id); if(!t) return; t.questions.forEach(function(q){
    if(q.scene) return; var tb=q.options.some(function(o){return /top|bottom/i.test(o.t);});
    if(tb){ q.scene='plates'; q.options.forEach(function(o){ o.hi=/top/i.test(o.t)?'top':(/bottom/i.test(o.t)?'bottom':o.hi); }); }
  });});

  /* ---- QUEUES : options mention first/front or last/back ---- */
  ['queue'].forEach(function(id){ var t=findTopic('data',id); if(!t) return; t.questions.forEach(function(q){
    if(q.scene) return; var fl=q.options.some(function(o){return /first|front|last|back/i.test(o.t);});
    if(fl){ q.scene='queue'; q.options.forEach(function(o){ o.hi=/first|front/i.test(o.t)?'first':(/last|back/i.test(o.t)?'last':o.hi); }); }
  });});

  /* ---- POSITIONS / ORDINALS : row of items, highlight the matching one ---- */
  function tagRow(sec,id){ var t=findTopic(sec,id); if(!t) return; t.questions.forEach(function(q){
    if(q.scene) return; var items=tokens(q.big); if(items.length<2||items.length>6) return;
    var anyMatch=q.options.some(function(o){return items.indexOf(o.d)>=0;});
    if(!anyMatch) return;
    q.scene='row'; q.sceneData={items:items};
    q.options.forEach(function(o){ if(items.indexOf(o.d)>=0) o.hi=o.d; });
  });}
  tagRow('data','position');
  tagRow('olympiad','l2-ordinal');

  /* ---- NUMBER LINE : options are numbers ---- */
  function tagNum(sec,id,min,max){ var t=findTopic(sec,id); if(!t) return; t.questions.forEach(function(q){
    if(q.scene) return; var nums=q.options.map(function(o){return numOf(o.d);});
    if(!nums.every(function(n){return !isNaN(n);})) return;
    q.scene='numline'; q.sceneData={min:min,max:max};
    q.options.forEach(function(o){ var n=numOf(o.d); if(!isNaN(n)) o.hi=String(n); });
  });}
  tagNum('olympiad','numorder',0,10);
  tagNum('olympiad','l2-teens',10,20);

  /* ---- SIZES : scale items, highlight the chosen one ---- */
  var SIZEMAP={'🐘':8,'🦒':9,'🌳':9,'🚌':8,'🛁':7,'🐕':4,'🐍':6,'🍉':7,'🏀':5,'📏':6,'🐈':3,'🐭':2,'🐛':1,'🐌':1,'🐜':1,'🍎':3,'🍒':1,'🌷':2,'🍄':1,'🥛':2,'🚲':4,'⚽':4,'🎾':2,'✏️':3,'🖍️':2,'🪨':6,'🪶':1};
  (function(){ var t=findTopic('algorithms','sort'); if(!t) return; t.questions.forEach(function(q){
    if(q.scene) return; var items=tokens(q.big); if(items.length<2||items.length>5) return;
    var anyMatch=q.options.some(function(o){return items.indexOf(o.d)>=0;});
    if(!anyMatch) return;
    q.scene='sizes'; q.sceneData={items:items.map(function(e){return {e:e,s:SIZEMAP[e]||3};})};
    q.options.forEach(function(o){ if(items.indexOf(o.d)>=0) o.hi=o.d; });
  });})();
})();
</script>
